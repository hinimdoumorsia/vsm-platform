# ============================================================
# VSM Platform — application.yml (Version H2 pour développement)
# ============================================================
spring:
  application:
    name: vsm-platform

  datasource:
    url: jdbc:h2:mem:vsmdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false  # Désactiver Flyway pour le développement

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-min-32-chars}
      expiration-ms: 86400000  # 24h

  websocket:
    allowed-origins: "*"

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.vsm.platform: DEBUG
    org.springframework.web: INFO