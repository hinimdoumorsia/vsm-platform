# ============================================================
# VSM Platform — Docker Compose (full stack)
# ============================================================
version: '3.9'

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: vsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vsm_db
      POSTGRES_USER:     vsm
      POSTGRES_PASSWORD: vsm_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsm -d vsm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: vsm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vsm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:   jdbc:postgresql://postgres:5432/vsm_db
      DATABASE_USER:  vsm
      DATABASE_PASS:  vsm_secret
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      JWT_SECRET:     change-me-in-production-min-32-chars-long
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- React Frontend (Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api/v1
        VITE_WS_URL:  ws://localhost:8080/ws
    container_name: vsm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:

